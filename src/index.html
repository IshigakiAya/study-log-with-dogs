<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学習ログ - 今日のわんちゃん</title>
    <link rel="stylesheet" href="../dist/output.css">
</head>
<body class="bg-gray-100">
    <main class="mx-auto max-w-3xl p-4">
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-blue-500">学習ログ - 今日のわんちゃん</h1>
            <p class="mt-2 text-gray-600">今日の学習時間を記録して、わんちゃんに癒されましょう。</p>
        </header>
        <section class="mb-6 rounded-2xl bg-white p-4 shadow">
            <h2 class="mb-4 text-xl font-bold text-gray-800">学習ログを入力</h2>

            <form id="study-form">
                <div class="mb-4">
                    <label for="study-title" class="mb-1 block text-sm font-medium text-gray-700">学習内容</label>
                    <input id="study-title" type="text" class="w-full rounded border border-gray-300 p-2" placeholder="例：JavaScriptの基礎">
                </div>
                <div class="mb-4">
                    <label for="study-time" class="mb-1 block text-sm font-medium text-gray-700">学習時間（分）</label>
                    <input id="study-time" type="number" class="w-full rounded border border-gray-300 p-2" placeholder="例：30">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-pink-500 rounded px-4 py-2 font-bold text-white shadow transition hover:from-blue-400 hover:to-pink-400">登録する</button>
            </form>
        </section>

        <section class="mb-6 rounded-2xl bg-white p-4 shadow">
            <h2 class="mb-2  text-xl font-bold text-gray-800">合計学習時間</h2>
            <p class="text-2xl font-bold text-blue-500">0分</p>
        </section>

        <section class="mb-6 rounded-2xl bg-white p-4 shadow">
            <h2 class="mb-4 text-xl font-bold text-gray-800">学習ログ一覧</h2>

            <ul id="study-log-list" class="space-y-2"></ul>
        </section>

        <section class="mb-6 rounded-2xl bg-white p-4 shadow">
            <h2 class="mb-4 text-xl font-bold text-gray-800">今日のわんちゃん</h2>

            <div class="rounded-xl bg-gray-100 p-4 text-center text-gray-600">
                犬画像がここに表示されます。
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
